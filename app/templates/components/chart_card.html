{% macro render_chart_card(chart_id, title) %}
<div class="card glass-card h-100 fade-in-up">
    <div class="card-body d-flex flex-column" style="min-height: 320px;">
        <h5 class="card-title mb-3 text-light fw-bold" style="font-size: 1.1rem; border-left: 3px solid var(--accent-cyan); padding-left: 0.50rem;">
            {{ title }}
        </h5>
        <div class="chart-container flex-grow-1" style="position: relative; height: 250px; width: 100%;">
            <canvas id="{{ chart_id }}"></canvas>
        </div>
    </div>
</div>
{% endmacro %}
